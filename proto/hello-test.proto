syntax = "proto3";

package trpc.proto.test;

option go_package = "github.com/Architectural-Practices/proto-test";

message HelloReq {
  string openid = 1;
}

message HelloRsp {
  string msg = 1;
}

message TestReq {

}

message TestRsp{

}


service Hello {
  rpc Hello (HelloReq) returns (HelloRsp) {}
  rpc Test(TestReq) returns (TestRsp) {}
}

