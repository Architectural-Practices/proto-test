name: Proto Build and Release

on:
  push:
    branches:
      - proto
    paths:
      - "proto/**"
      - "go.mod"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proto branch
        uses: actions/checkout@v4
        with:
          ref: proto
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.4"

      - name: Get next version
        id: version
        run: |
          # 获取最后一个版本 tag
          LAST_TAG=$(git describe --tags --match="v*" 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          # 解析版本号 (v0.0.0 -> 0 0 0)
          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # 补丁版本号自增
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_VERSION"

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          protoc --version

      - name: Install Go protoc plugins
        run: |
          go install github.com/grpc/grpc-go/cmd/protoc-gen-go-grpc@latest
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest

      - name: Generate Go files from proto
        run: |
          mkdir -p pkg/pb
          protoc \
            --go_out=pkg \
            --go-grpc_out=pkg \
            --go_opt=paths=source_relative \
            --go-grpc_opt=paths=source_relative \
            proto/**/*.proto 2>/dev/null || true

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes generated"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in proto compilation"
            git diff --stat
          fi

      - name: Commit generated files to proto branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: generate protobuf files for ${{ steps.version.outputs.version }}"

      - name: Create and push tags
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git tag ${{ steps.version.outputs.version }}
          git tag -f latest
          git push origin proto
          git push origin ${{ steps.version.outputs.version }}
          git push origin latest -f
          echo "✅ Created tags: ${{ steps.version.outputs.version }} and latest"

      - name: Checkout and merge to main
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git fetch origin main:main 2>/dev/null || git checkout -b main
          git checkout main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge origin/proto --no-edit -m "chore: merge proto branch with tag ${{ steps.version.outputs.version }}"

      - name: Push to main branch with tags
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push origin main
          git push origin ${{ steps.version.outputs.version }}
          git push origin latest -f

      - name: Create Release
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: |
            ## Proto Generated Release

            **Version**: ${{ steps.version.outputs.version }}

            Generated Go files from protobuf definitions.

            ### Download
            ```bash
            go get github.com/Architectural-Practices/proto-test@${{ steps.version.outputs.version }}
            go get github.com/Architectural-Practices/proto-test@latest
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PROTO_BUILD_TOKEN }}
