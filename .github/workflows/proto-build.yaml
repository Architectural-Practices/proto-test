name: Proto Build and Release

on:
  push:
    branches:
      - proto
    paths:
      - "proto/**"
      - "go.mod"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout proto branch
        uses: actions/checkout@v4
        with:
          ref: proto
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.26.4"

      - name: Get next version
        id: version
        run: |
          # 获取最后一个版本 tag
          LAST_TAG=$(git describe --tags --match="v*" 2>/dev/null || echo "v0.0.0")
          echo "Last tag: $LAST_TAG"

          # 解析版本号 (v0.0.0 -> 0 0 0)
          VERSION=${LAST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)

          # 补丁版本号自增
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_VERSION"

      - name: Install tRPC CLI
        run: |
          go install trpc.group/trpc-go/trpc-cmdline/trpc@latest
          trpc setup

      - name: Generate Go files from proto
        run: |
          shopt -s globstar
          mkdir -p pkg/pb
          for f in proto/**/*.proto; do
            trpc create --protofile="$f" --output=pkg/pb --rpconly --force --lang=go
          done

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes generated"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in proto compilation"
            git diff --stat
          fi
          ls pkg/pb/

      - name: Commit generated files to main branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          # 保存生成的文件到临时目录
          mkdir -p /tmp/proto-gen
          cp -r pkg /tmp/proto-gen/

          # 切换到 main 分支
          git checkout main

          # 恢复生成的文件
          cp -r /tmp/proto-gen/pkg .

          # 提交到 main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pkg/
          git commit -m "chore: generate protobuf files for ${{ steps.version.outputs.version }}"

          # 打 tag
          git tag ${{ steps.version.outputs.version }}
          git tag -f latest

      - name: Push main branch and tags
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git push origin main
          git push origin ${{ steps.version.outputs.version }}
          git push origin latest -f
          echo "✅ Pushed main branch and tags: ${{ steps.version.outputs.version }}, latest"

      - name: Create Release
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body: |
            ## Proto Generated Release

            **Version**: ${{ steps.version.outputs.version }}

            Generated Go files from protobuf definitions.

            ### Download
            ```bash
            go get github.com/Architectural-Practices/proto-test@${{ steps.version.outputs.version }}
            go get github.com/Architectural-Practices/proto-test@latest
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.PROTO_BUILD_TOKEN }}
